name: Build Kivy APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies & Buildozer
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev cmake
          pip install --upgrade "cython<3.0" "buildozer==1.5.0"

      - name: Auto-generate buildozer.spec if missing
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
            sed -i 's/^requirements = .*/requirements = python3,kivy,reportlab,openpyxl,pillow/' buildozer.spec
            sed -i 's/^# android.archs = .*/android.archs = arm64-v8a/' buildozer.spec
            sed -i 's/^android.archs = .*/android.archs = arm64-v8a/' buildozer.spec
            sed -i 's/^# android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
            sed -i 's/^#\? \?android.ndk = .*/android.ndk = 25b/' buildozer.spec
          fi

      - name: Build APK with Buildozer
        run: |
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-APK
          path: bin/*.apk
