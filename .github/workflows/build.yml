name: Build Kivy APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System & Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libffi-dev libssl-dev cmake \
            libjpeg-dev libfreetype6-dev lld clang build-essential libltdl-dev

          pip install --upgrade pip setuptools wheel
          pip install "cython<3.0" "buildozer==1.5.0"

      - name: Configure buildozer.spec
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          # دعم جميع معماريات الهواتف + إضافة et_xmlfile للمنع القاطع للانهيار
          sed -i 's/^#\? \?source.include_exts = .*/source.include_exts = py,png,jpg,kv,atlas,ttf,xlsx/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy,pillow,openpyxl,et_xmlfile,fpdf2,fonttools,defusedxml,arabic_reshaper,python-bidi/' buildozer.spec
          sed -i 's/^#\? \?android.archs = .*/android.archs = arm64-v8a, armeabi-v7a/' buildozer.spec
          sed -i 's/^#\? \?android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^#\? \?android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/^#\? \?android.api = .*/android.api = 33/' buildozer.spec
          sed -i 's/^#\? \?android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^#\? \?android.permissions = .*/android.permissions = READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE/' buildozer.spec

      - name: Build APK with Buildozer
        env:
          ANDROID_NDK_HOME: ''
          ANDROID_NDK_ROOT: ''
          ANDROID_NDK: ''
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-APK
          path: bin/*.apk
